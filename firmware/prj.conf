# BLE Receiver - Zephyr/nRF Connect SDK Configuration

# System
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Bluetooth core
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_GATT_CLIENT=y

# Initial target mode: 1 Receiver <-> 1 Keyfob (P2P ranging)
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# Security / bonding
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Prefer deterministic connection-based RSSI cadence
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27

# Channel Sounding is not enabled in current NCS baseline (API not app-ready)
# CONFIG_BT_CHANNEL_SOUNDING=y

# Direction Finding (AoA) - optional future mode only
# CONFIG_BT_DF=y
# CONFIG_BT_DF_CONNECTIONLESS_CTE_RX=y
# CONFIG_BT_DF_CONNECTION_CTE_RX=y
# CONFIG_BT_EXT_ADV=y

# UART for inter-node communication (future multi-anchor mode)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Float support for trilateration math
CONFIG_FPU=y
CONFIG_NEWLIB_LIBC=y

# Kernel work queue (for reconnect scheduling)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Channel Sounding migration path
CONFIG_BLE_CS_ENABLE=n
CONFIG_TRIANGULATION_RSSI_FALLBACK_SIGMA_CM=400

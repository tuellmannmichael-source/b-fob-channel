# BLE Keyfob - Zephyr/nRF Connect SDK Configuration

# System
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="KEYFOB"

# Initial target mode: exactly one receiver connection
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# Security / bonding
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Keep packet size small/stable for periodic heartbeat RSSI sampling
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27

# Channel Sounding is not enabled in current NCS baseline (API not app-ready)
# CONFIG_BT_CHANNEL_SOUNDING=y

# Optional future modes only
# CONFIG_BT_EXT_ADV=y
# CONFIG_BT_DF=y
# CONFIG_BT_DF_CONNECTIONLESS_CTE_TX=y
# CONFIG_BT_DF_CONNECTION_CTE_TX=y

# Power management
CONFIG_PM=y
